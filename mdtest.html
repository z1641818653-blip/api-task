<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown 渲染测试</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>MathJax={tex:{inlineMath:[['$','$'],['\\(','\\)']],displayMath:[['$$','$$'],['\\[','\\]']]},options:{skipHtmlTags:['script','noscript','style','textarea','pre','code']}};</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/python.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/javascript.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/bash.min.js"></script>
<style>
:root{--bg:#f3f0f8;--surface:#fff;--surface2:#ede8f5;--text:#221c38;--text2:#6b5b8a;--border:#d8ceea;--primary:#6d3fc0;--primary-light:rgba(109,63,192,0.08);--shadow:0 1px 4px rgba(0,0,0,.04);--radius:12px;--radius-sm:9px;--font-mono:'SF Mono','JetBrains Mono','Menlo',monospace}
[data-theme="dark"]{--bg:#14101e;--surface:#1e1830;--surface2:#282140;--text:#ddd8f0;--text2:#9488b8;--border:#342c50;--primary:#8b6fd8;--primary-light:rgba(139,111,216,0.12);--shadow:0 1px 4px rgba(0,0,0,.2)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','PingFang SC',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
.layout{display:flex;height:100vh;position:relative;overflow:hidden}

/* ── Left Sidebar ── */
.sidebar{width:230px;min-width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width .3s cubic-bezier(.4,0,.2,1),min-width .3s cubic-bezier(.4,0,.2,1),opacity .2s;overflow:hidden;position:relative;z-index:20}
.sidebar.collapsed{width:0!important;min-width:0!important;padding:0;opacity:0;border:none}
.sidebar .header{padding:16px 18px 12px;font-size:13px;font-weight:700;background:var(--surface);border-bottom:1px solid var(--border);letter-spacing:.01em}
.sidebar .body{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.sidebar .body label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.sidebar input{padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:12px;outline:none;background:var(--surface);color:var(--text);width:100%;transition:border-color .2s,box-shadow .2s;font-family:var(--font-mono);letter-spacing:.3px}
.sidebar input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}
.history-list{display:flex;flex-direction:column;gap:2px;max-height:260px;overflow-y:auto;padding:2px 0}
.history-item{display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:8px;cursor:pointer;font-size:12px;color:var(--text);transition:background .15s}
.history-item:hover{background:var(--primary-light)}
.history-item.active{background:var(--primary-light);color:var(--primary);font-weight:700}
.history-item .h-del{margin-left:auto;opacity:0;cursor:pointer;font-size:10px;color:var(--text2);width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.history-item:hover .h-del{opacity:1}
.history-item .h-del:hover{background:rgba(239,68,68,.12);color:#e74c3c}
.btn{display:block;width:100%;padding:8px;border:none;border-radius:var(--radius-sm);font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s;letter-spacing:.02em}
.btn-primary{background:linear-gradient(135deg,#6d3fc0,#5a2fa8);color:#fff;box-shadow:0 2px 8px rgba(109,63,192,.2)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(109,63,192,.35)}
.btn-primary:active{transform:scale(.97)}
.theme-toggle{padding:10px 14px;border-top:1px solid var(--border);font-size:12px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:8px;margin-top:auto;transition:color .15s;font-weight:500}
.theme-toggle:hover{color:var(--primary)}

/* ── Sidebar toggle ── */
.sidebar-header{display:flex;align-items:center;padding:16px 14px 12px 18px;border-bottom:1px solid var(--border);gap:8px}
.sidebar-header span{font-size:13px;font-weight:700;letter-spacing:.01em;flex:1}
#sidebarToggle{position:absolute;top:8px;left:236px;z-index:25;background:var(--surface);border:1px solid var(--border);color:var(--text2);font-size:10px;width:24px;height:24px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:left .35s cubic-bezier(.4,0,.2,1),background .15s,opacity .3s;box-shadow:0 1px 4px rgba(0,0,0,.04)}
#sidebarToggle:hover{background:var(--primary-light);color:var(--primary);border-color:var(--primary)}
.sidebar.collapsed~#sidebarToggle{left:6px;border-radius:6px}

/* ── Main area ── */
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;position:relative}
.split{flex:1;display:flex;overflow:hidden;position:relative}
.pane{display:flex;flex-direction:column;overflow:hidden;position:relative}
.pane-left{flex:1;min-width:100px}
.pane-right{flex:1;min-width:100px}
.pane.collapsed{flex:0!important;min-width:0!important;width:0!important;overflow:hidden}
.pane-header{padding:9px 16px;font-size:11px;font-weight:700;color:var(--text2);background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;flex-shrink:0;backdrop-filter:blur(8px)}
.pane-header .pane-btn{background:transparent;border:1px solid var(--border);color:var(--text2);font-size:9px;padding:3px 12px;border-radius:10px;cursor:pointer;transition:all .2s;flex-shrink:0;font-weight:600}
.pane-header .pane-btn:hover{background:var(--primary-light);color:var(--primary);border-color:var(--primary)}
.pane-header .pane-btn:active{transform:scale(.95)}

/* ── Splitter ── */
.splitter{width:5px;cursor:col-resize;background:transparent;position:relative;z-index:15;flex-shrink:0;transition:background .2s}
.splitter:hover,.splitter.active{background:var(--primary);opacity:.25}
.splitter::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:2px;height:24px;border-radius:2px;background:var(--border);transition:background .2s,height .2s}
.splitter:hover::after,.splitter.active::after{background:var(--primary);height:40px}
.dragging{user-select:none!important;pointer-events:none!important}
.dragging .splitter{opacity:.5}
.dragging *{cursor:col-resize!important}

/* ── Restore buttons ── */
.restore-btn{position:absolute;top:50%;z-index:20;transform:translateY(-50%);width:28px;height:60px;padding:0;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:9px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:all .2s;display:flex;align-items:center;justify-content:center;line-height:1.2;writing-mode:vertical-lr;letter-spacing:1px}
.restore-btn:hover{background:var(--primary-light);color:var(--primary);border-color:var(--primary)}
#restoreLeft{left:4px;border-radius:0 8px 8px 0;border-left:none}
#restoreRight{right:4px;border-radius:8px 0 0 8px;border-right:none}

.editor-wrap{flex:1;overflow:hidden}
.editor-wrap textarea{width:100%;height:100%;border:none;resize:none;outline:none;padding:18px 20px;font-family:var(--font-mono);font-size:13px;line-height:1.8;background:var(--surface);color:var(--text);tab-size:2}
.editor-wrap textarea::placeholder{color:var(--text2);opacity:.25}
.editor-wrap textarea:focus{background:var(--surface)}
.preview-wrap{flex:1;overflow-y:auto;padding:18px 22px;background:var(--surface);line-height:1.75;font-size:14px}
.preview-wrap h1,.preview-wrap h2,.preview-wrap h3{margin-top:20px;margin-bottom:10px;font-weight:700;letter-spacing:-.01em}
.preview-wrap h1{font-size:1.5em}.preview-wrap h2{font-size:1.25em}.preview-wrap h3{font-size:1.1em}
.preview-wrap p{margin-bottom:10px}
.preview-wrap code{background:var(--surface2);padding:2px 6px;border-radius:4px;font-family:var(--font-mono);font-size:.9em;color:#e83e8c}
.preview-wrap pre{background:#1e1e2e;color:#e0e0e0;padding:14px;border-radius:var(--radius-sm);overflow-x:auto;margin:12px 0;border:1px solid #2e2e3e}
.preview-wrap pre code{background:none;padding:0;color:inherit;font-size:.85em}
.preview-wrap ul,.preview-wrap ol{margin-left:22px;margin-bottom:10px}
.preview-wrap blockquote{border-left:3px solid var(--primary);padding:6px 16px;margin:10px 0;color:var(--text2);background:var(--surface2);border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.preview-wrap table{border-collapse:collapse;margin:10px 0;width:100%;font-size:13px}
.preview-wrap th,.preview-wrap td{border:1px solid var(--border);padding:8px 12px;text-align:left}
.preview-wrap th{background:var(--surface2);font-weight:600}
.preview-wrap tr:nth-child(even){background:var(--bg)}
.preview-wrap img{max-width:100%;border-radius:var(--radius-sm);margin:8px 0}
.preview-wrap a{color:var(--primary)}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header"><span>⚙️ 设置</span></div>
    <div class="body">
      <div class="btn btn-primary" id="newDocBtn">📄 新建文档</div>
      <div style="font-size:10px;color:var(--text2);font-weight:600;margin-top:4px">历史记录</div>
      <div class="history-list" id="historyList"></div>
    </div>
    <div class="theme-toggle" id="themeToggle">🌙 暗色模式</div>
  </aside>
  <button class="sidebar-toggle" id="sidebarToggle">◀</button>

  <main class="main-area">
    <div class="split" id="split">
      <div class="pane pane-left" id="paneLeft">
        <div class="pane-header"><span style="flex:1;text-align:center">Markdown</span><span class="count" id="charCount">0 字符</span><button class="pane-btn" id="collapseLeft" style="margin-left:8px">◀ 折叠</button></div>
        <div class="editor-wrap"><textarea id="editor" placeholder="在此输入 Markdown..."></textarea></div>
      </div>
      <div class="splitter" id="splitter"></div>
      <button class="restore-btn" id="restoreLeft" style="display:none">▶ 展开编辑</button>
      <button class="restore-btn" id="restoreRight" style="display:none">展开预览 ▶</button>
      <div class="pane pane-right" id="paneRight">
        <div class="pane-header"><span style="flex:1;text-align:center">预览</span><button class="pane-btn" id="collapseRight">▶ 折叠</button></div>
        <div class="preview-wrap" id="preview"><p style="color:var(--text2);opacity:.4;text-align:center;padding:40px 0">输入 Markdown，此处实时预览</p></div>
      </div>
    </div>
  </main>
</div>

<script>
if(typeof marked!=='undefined')marked.setOptions({breaks:true,gfm:true});

// ── State ──
const docs=[];let activeDocId=null;
const editor=document.getElementById('editor'),preview=document.getElementById('preview'),charCount=document.getElementById('charCount'),historyList=document.getElementById('historyList');

// ── Load ──
(function(){
  try{const d=localStorage.getItem('md_docs');if(d){const a=JSON.parse(d);a.forEach(function(i){docs.push(i)});if(docs.length>0)activeDocId=docs[0].id}}catch(e){}
  if(docs.length===0){const id=Date.now().toString();docs.push({id:id,title:'欢迎',content:'# Markdown 渲染测试\n\n## 支持\n\n- **加粗** *斜体* ~~删除线~~\n- `行内代码` 和代码块\n- LaTeX 公式 $E=mc^2$\n\n```python\nprint("Hello")\n```\n\n> 左侧编辑，右侧实时预览'});activeDocId=id;}
})();

function saveDocs(){try{localStorage.setItem('md_docs',JSON.stringify(docs))}catch(e){}}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function renderMD(content){
  if(!content)return'';
  content=content.replace(/\\\[([\s\S]*?)\\\]/g,(m,f)=>'$$'+f+'$$');
  content=content.replace(/\\\((.+?)\\\)/g,(m,f)=>'$'+f+'$');
  const bl=[];let p=content;
  p=p.replace(/\$\$([\s\S]*?)\$\$/g,(m,f)=>{bl.push({t:'block',c:f.trim()});return'\u0000B'+(bl.length-1)+'\u0000E';});
  p=p.replace(/(?<!\$)\$(?!\$)([^$\n]+?)(?<!\$)\$(?!\$)/g,(m,f)=>{bl.push({t:'inline',c:f.trim()});return'\u0000I'+(bl.length-1)+'\u0000E';});
  let h;
  if(typeof marked!=='undefined'){try{h=marked.parse(p);}catch(e){h=esc(p).replace(/\n/g,'<br>');}}
  else{h=esc(p).replace(/\n/g,'<br>');}
  bl.forEach(function(b,i){const ph=b.t==='block'?'\u0000B'+i+'\u0000E':'\u0000I'+i+'\u0000E';const rp=b.t==='block'?'$$'+b.c+'$$':'$'+b.c+'$';h=h.split(ph).join(rp);});
  return h;
}

function updatePreview(){
  const text=editor.value;
  preview.innerHTML=renderMD(text)||'<p style="color:var(--text2);opacity:.4;text-align:center">输入 Markdown，此处实时预览</p>';
  charCount.textContent=text.length+' 字符 · '+(text.split('\n').length)+' 行';
  if(typeof hljs!=='undefined'){preview.querySelectorAll('pre code').forEach(function(b){hljs.highlightElement(b);});}
  if(typeof MathJax!=='undefined'){MathJax.typesetPromise([preview]).catch(function(){});}
  const doc=docs.find(d=>d.id===activeDocId);
  if(doc){doc.content=text;doc.title=text.split('\n')[0].replace(/^#\s*/,'').slice(0,30)||'未命名';saveDocs();renderHistory();}
}

function renderHistory(){
  historyList.innerHTML='';
  docs.forEach(function(doc){
    const el=document.createElement('div');el.className='history-item'+(doc.id===activeDocId?' active':'');
    el.innerHTML='<span>📄</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(doc.title)+'</span><span class="h-del" data-id="'+doc.id+'">✕</span>';
    el.addEventListener('click',function(e){if(e.target.closest('.h-del'))return;switchDoc(doc.id);});
    el.querySelector('.h-del').addEventListener('click',function(e){e.stopPropagation();if(docs.length<=1){showToast('至少保留一个','warning');return;}const idx=docs.findIndex(d=>d.id===doc.id);if(idx>-1)docs.splice(idx,1);if(activeDocId===doc.id){activeDocId=docs[0].id;loadDoc(activeDocId);}saveDocs();renderHistory();});
    historyList.appendChild(el);
  });
}

function switchDoc(id){
  const cur=docs.find(d=>d.id===activeDocId);
  if(cur){cur.content=editor.value;cur.title=editor.value.split('\n')[0].replace(/^#\s*/,'').slice(0,30)||'未命名';}
  activeDocId=id;saveDocs();loadDoc(id);renderHistory();
}
function loadDoc(id){const doc=docs.find(d=>d.id===id);if(!doc)return;editor.value=doc.content;updatePreview();}
function newDoc(){
  const cur=docs.find(d=>d.id===activeDocId);
  if(cur){cur.content=editor.value;cur.title=editor.value.split('\n')[0].replace(/^#\s*/,'').slice(0,30)||'未命名';}
  const id=Date.now().toString();docs.push({id:id,title:'新文档',content:'# 新文档\n\n开始输入...'});activeDocId=id;
  saveDocs();loadDoc(id);renderHistory();showToast('已创建','success');
}

// ── Preview debounce ──
let timer=null;
editor.addEventListener('input',function(){clearTimeout(timer);timer=setTimeout(updatePreview,30);});

// ── Sidebar toggle ──
document.getElementById('sidebarToggle').addEventListener('click',function(){
  const s=document.getElementById('sidebar');s.classList.toggle('collapsed');
  this.textContent=s.classList.contains('collapsed')?'▶':'◀';
  // When collapsed, the button is hidden (inside collapsed sidebar), so auto-show after transition
  // When expanded, show normally
});

// ── Theme ──
document.getElementById('themeToggle').addEventListener('click',function(){
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',dark?'light':'dark');
  this.textContent=dark?'🌙 暗色模式':'☀️ 亮色模式';
  localStorage.setItem('md_dark',dark?'':'true');
});

// ── New doc ──
document.getElementById('newDocBtn').addEventListener('click',newDoc);

// ── Restore buttons ──
document.getElementById('restoreLeft').addEventListener('click',function(){
  hiddenLeft=false;paneLeft.style.flex='';paneLeft.style.overflow='';paneLeft.style.minWidth='';
  document.getElementById('collapseLeft').textContent='◀ 折叠';
  splitter.style.display='block';this.style.display='none';
  document.getElementById('restoreRight').style.display=hiddenRight?'flex':'none';
});
document.getElementById('restoreRight').addEventListener('click',function(){
  hiddenRight=false;paneRight.style.flex='';paneRight.style.overflow='';paneRight.style.minWidth='';
  document.getElementById('collapseRight').textContent='▶ 折叠';
  splitter.style.display='block';this.style.display='none';
  document.getElementById('restoreLeft').style.display=hiddenLeft?'flex':'none';
});

// ── Pane collapse ──
const paneLeft=document.getElementById('paneLeft'),paneRight=document.getElementById('paneRight'),splitter=document.getElementById('splitter');
var hiddenLeft=false,hiddenRight=false;
document.getElementById('collapseLeft').addEventListener('click',function(){
  hiddenLeft=!hiddenLeft;
  paneLeft.style.flex=hiddenLeft?'0 0 0':'';paneLeft.style.overflow=hiddenLeft?'hidden':'';
  paneLeft.style.minWidth=hiddenLeft?'0':'';
  this.textContent=hiddenLeft?'▶ 展开':'◀ 折叠';
  splitter.style.display=hiddenLeft||hiddenRight?'none':'block';
  document.getElementById('restoreRight').style.display=hiddenRight?'flex':'none';
  document.getElementById('restoreLeft').style.display=hiddenLeft?'flex':'none';
});
document.getElementById('collapseRight').addEventListener('click',function(){
  hiddenRight=!hiddenRight;
  paneRight.style.flex=hiddenRight?'0 0 0':'';paneRight.style.overflow=hiddenRight?'hidden':'';
  paneRight.style.minWidth=hiddenRight?'0':'';
  this.textContent=hiddenRight?'▶ 展开':'▶ 折叠';
  splitter.style.display=hiddenLeft||hiddenRight?'none':'block';
  document.getElementById('restoreRight').style.display=hiddenRight?'flex':'none';
  document.getElementById('restoreLeft').style.display=hiddenLeft?'flex':'none';
});

// ── Splitter drag ──
(function(){
  let d=false,sx=0,sw=0;
  splitter.addEventListener('mousedown',function(e){d=true;sx=e.clientX;sw=paneLeft.offsetWidth;splitter.classList.add('active');document.body.classList.add('dragging');e.preventDefault()});
  document.addEventListener('mousemove',function(e){if(!d)return;var w=Math.max(80,Math.min(window.innerWidth-220-80-5,sw+e.clientX-sx));paneLeft.style.flex='none';paneLeft.style.width=w+'px';});
  document.addEventListener('mouseup',function(){if(d){d=false;splitter.classList.remove('active');document.body.classList.remove('dragging');}});
})();

// ── Toast ──
function showToast(msg,type){
  type=type||'info';
  let c=document.getElementById('tc');if(!c){c=document.createElement('div');c.id='tc';c.style.cssText='position:fixed;top:14px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:6px';document.body.appendChild(c);}
  const t=document.createElement('div');
  t.style.cssText='padding:8px 18px;border-radius:8px;font-size:12px;font-weight:500;color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.2);max-width:300px;background:'+(type==='success'?'#10b981':type==='warning'?'#f59e0b':'#6d3fc0');
  t.textContent=msg;c.appendChild(t);
  setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(function(){if(t.parentNode)t.remove()},300)},2500);
}

// ── Init ──
(function(){
  if(localStorage.getItem('md_dark')==='true'){document.documentElement.setAttribute('data-theme','dark');document.getElementById('themeToggle').textContent='☀️ 亮色模式';}
  if(activeDocId)loadDoc(activeDocId);renderHistory();
})();
</script>
</body>
</html>

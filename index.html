  function clearSearch(){S.sr=[];S.csi=-1;E.sc.textContent='0/0';E.sp.disabled=true;E.sn.disabled=true;document.querySelectorAll('.search-highlight').forEach(el=>{const p=el.parentNode;if(p)p.replaceChild(document.createTextNode(el.textContent),el);});E.mc.normalize();}
  function doSearch(){clearSearch();const q=E.si.value.trim();if(!q)return;const bubbles=E.mc.querySelectorAll('.message-bubble');const regex=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');bubbles.forEach(bubble=>{const walker=document.createTreeWalker(bubble,NodeFilter.SHOW_TEXT,{acceptNode:function(node){let p=node.parentNode;while(p&&p!==bubble){if(p.tagName==='MJX-CONTAINER'||p.tagName==='PRE'||p.tagName==='CODE')return NodeFilter.FILTER_REJECT;p=p.parentNode;}return NodeFilter.FILTER_ACCEPT;}},false);const tns=[];while(walker.nextNode())tns.push(walker.currentNode);tns.forEach(node=>{const text=node.textContent;if(regex.test(text)){const frag=document.createDocumentFragment();let li=0,m;regex.lastIndex=0;while((m=regex.exec(text))!==null){if(m.index>li)frag.appendChild(document.createTextNode(text.substring(li,m.index)));const sp=document.createElement('span');sp.className='search-highlight';sp.textContent=m[0];frag.appendChild(sp);li=m.index+m[0].length;}if(li<text.length)frag.appendChild(document.createTextNode(text.substring(li)));node.parentNode.replaceChild(frag,node);}});});S.sr=Array.from(E.mc.querySelectorAll('.search-highlight'));S.csi=S.sr.length>0?0:-1;updateSU();if(S.sr.length>0){S.sr.forEach(el=>el.classList.remove('active'));S.sr[0].classList.add('active');S.sr[0].scrollIntoView({behavior:'smooth',block:'center'});}}

  function renderMD(content){if(!content)return'';content=content.replace(/\\\[([\s\S]*?)\\\]/g,(m,f)=>`$$${f}$$`);content=content.replace(/\\\((.+?)\\\)/g,(m,f)=>`$${f}$`);const bl=[];let p=content;p=p.replace(/\$\$([\s\S]*?)\$\$/g,(m,f)=>{bl.push({t:'block',c:f.trim()});return`\u0000B${bl.length-1}\u0000E`;});p=p.replace(/(?<!\$)\$(?!\$)([^$\n]+?)(?<!\$)\$(?!\$)/g,(m,f)=>{bl.push({t:'inline',c:f.trim()});return`\u0000I${bl.length-1}\u0000E`;});let h;if(typeof marked!=='undefined'){try{h=marked.parse(p);}catch(e){h=esc(p).replace(/\n/g,'<br>');}}else{h=esc(p).replace(/\n/g,'<br>');}bl.forEach((b,i)=>{const ph=b.t==='block'?`\u0000B${i}\u0000E`:`\u0000I${i}\u0000E`;const rp=b.t==='block'?`$$${b.c}$$`:`$${b.c}$`;h=h.split(ph).join(rp);});return h;}

  // ============ 流式发送 ============
  async function streamSend(userMessage) {
    const p = getCurrentProvider();
    const cfg = getCurrentProviderConfig();
    const key = cfg.apiKey.replace(/[^\x00-\x7F]/g, '').trim();
    if (!key) { addM('assistant', `❌ 请先设置 ${p.name} 的 API Key`); finishSend(); return; }

    S.ac = new AbortController();
    const ms = [{ role: "system", content: S.ap }];
    const h = S.ctxLimit > 0 ? S.ch.slice(-S.ctxLimit) : S.ch;
    ms.push(...h);
    ms.push({ role: "user", content: userMessage });

    // 创建空的AI消息气泡
    const d = createAssistantMsgDOM();
    const bubble = d.querySelector('.message-bubble');
    let reasoningPanel = null;
    let reasoningContent = '';
    let fullContent = '';
    let isFirstChunk = true;

    try {
      await StreamModule.callStream(S.currentProvider, cfg.model, ms, S.maxTokens, key, {
        onReasoning(chunk) {
          reasoningContent += chunk;
          if (!reasoningPanel) {
            reasoningPanel = document.createElement('details');
            reasoningPanel.className = 'reasoning-panel';
            reasoningPanel.innerHTML = '<summary>🧠 思考过程</summary><div class="reasoning-content"></div>';
            reasoningPanel.open = true;
            d.insertBefore(reasoningPanel, bubble);
          }
          const rc = reasoningPanel.querySelector('.reasoning-content');
          if (rc) rc.textContent = reasoningContent;
          if (S.isNearBottom) E.cc.scrollTop = E.cc.scrollHeight;
        },
        onContent(chunk, isDone) {
          if (chunk) {
            fullContent += chunk;
            if (isFirstChunk) {
              bubble.textContent = chunk;
              isFirstChunk = false;
            } else {
              bubble.textContent = fullContent;
            }
          }
          if (isDone && fullContent) {
            // 渲染Markdown
            const rendered = renderMD(fullContent);
            bubble.innerHTML = rendered;
            if (typeof hljs !== 'undefined') { bubble.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b)); }
            if (typeof MathJax !== 'undefined') { MathJax.typesetPromise([bubble]); }
            bubble.querySelectorAll('pre').forEach(function(pre){if(!pre.querySelector('.code-copy-btn')){var cb=document.createElement('button');cb.className='code-copy-btn';cb.textContent='复制';cb.onclick=function(e){e.stopPropagation();var code=pre.querySelector('code')?pre.querySelector('code').textContent:pre.textContent;navigator.clipboard.writeText(code).then(function(){cb.textContent='已复制';cb.classList.add('copied');setTimeout(function(){cb.textContent='复制';cb.classList.remove('copied')},2000)}).catch(function(){alert('复制失败')})};pre.style.position='relative';pre.appendChild(cb)}});
            // 添加复制按钮
            const actions = d.querySelector('.message-actions');
            if (!actions.querySelector('.ctb')) {
              actions.innerHTML = '<button class="copy-btn ctb">📋 复制文本</button><button class="copy-btn cmb">📝 复制Markdown</button>';
              actions.querySelector('.ctb').addEventListener('click', () => copyT(stripMD(fullContent), actions.querySelector('.ctb')));
              actions.querySelector('.cmb').addEventListener('click', () => copyT(fullContent, actions.querySelector('.cmb')));
            }
            // 保存到对话
            const c = gC();
            if (c) {
              c.messages.push({ role: 'assistant', content: fullContent });
              c.history.push({ role: 'assistant', content: fullContent });
              S.ch = [...c.history];
              save(); updateJL();
            }
          }
          if (S.isNearBottom) E.cc.scrollTop = E.cc.scrollHeight;
        }
      });
      E.rs.textContent = '✅';
    } catch (e) {
      if (e.name === 'AbortError') {
        bubble.textContent = fullContent || '⏹️ 已停止';
        const c = gC();
        if (c && fullContent) { c.messages.push({ role: 'assistant', content: fullContent }); c.history.push({ role: 'assistant', content: fullContent }); S.ch = [...c.history]; save(); updateJL(); }
        E.rs.textContent = '⏹️';
      } else {
        bubble.textContent = `❌ ${e.message}`;
        E.rs.textContent = '❌';
      }
    } finally {
      finishSend();
    }
  }

    menuBtn.addEventListener('click', (e) => { e.stopPropagation(); document.querySelectorAll('.msg-popup').forEach(p => { if (document.body.contains(p)) p.style.display = 'none'; }); if (document.body.contains(popup)) { popup.style.display = popup.style.display === 'none' ? 'block' : 'none'; } });

  function addMD(role, content, idx) {
    const es = E.mc.querySelector('.empty-state'); if(es) es.remove(); let d;
    if (role === 'user') { d = buildUserMessage(content, idx); }
    else { d = document.createElement('div'); d.className = 'message assistant'; d.id = `msg-${idx}`; const rendered = renderMD(content); d.innerHTML = `<div class="message-label">${getCurrentProvider().name}</div><div class="message-bubble">${rendered}</div><div class="msg-time">${new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}</div><div class="message-actions"><button class="copy-btn ctb">📋 复制文本</button><button class="copy-btn cmb">📝 复制Markdown</button></div>`; d.querySelector('.ctb').addEventListener('click', () => copyT(stripMD(content), d.querySelector('.ctb'))); d.querySelector('.cmb').addEventListener('click', () => copyT(content, d.querySelector('.cmb'))); }
    E.mc.appendChild(d); d.dataset.content = content; setTimeout(() => { if (S.isNearBottom) E.cc.scrollTop = E.cc.scrollHeight; }, 100);
    if (typeof hljs !== 'undefined' && role === 'assistant') { setTimeout(() => { d.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b)); }, 200); }
    if (typeof MathJax !== 'undefined' && role === 'assistant') { setTimeout(() => { const bubble = d.querySelector('.message-bubble'); if (bubble) MathJax.typesetPromise([bubble]); }, 300); }
  }

  function addM(role,content){const c=gC();if(!c)return;c.messages.push({role,content});c.history.push({role,content});S.ch=[...c.history];addMD(role,content,c.messages.length-1);save();updateJL();if(role==='user'&&c.messages.filter(m=>m.role==='user').length===1){c.title=content.substring(0,30)+(content.length>30?'...':'');E.ct.textContent=c.title;renderCL();save();}}
  function addE(){const d=document.createElement('div');d.className='empty-state';d.textContent='在下方输入内容开始对话...';E.mc.appendChild(d);}
  function clearM(){E.mc.innerHTML='';}
  function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
  function stripMD(md){let t=md;t=t.replace(/#{1,6}\s/g,'');t=t.replace(/\*\*(.*?)\*\*/g,'$1');t=t.replace(/\*(.*?)\*/g,'$1');t=t.replace(/```[\s\S]*?```/g,'[代码]');t=t.replace(/`([^`]+)`/g,'$1');t=t.replace(/\[([^\]]+)\]\([^)]+\)/g,'$1');t=t.replace(/\$\$[\s\S]*?\$\$/g,'[公式]');t=t.replace(/\$([^$\n]+?)\$/g,'$1');return t;}
  async function copyT(text,btn){try{await navigator.clipboard.writeText(text);if(btn){btn.classList.add('copied');const o=btn.innerHTML;btn.innerHTML='✅ 已复制';setTimeout(()=>{btn.classList.remove('copied');btn.innerHTML=o;},2000);}}catch{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}}
  function stopR(){ StreamModule.abort(); if(S.ac){S.ac.abort();S.ac=null;} }

  async function send(){
    if(S.ir)return;
    if(S.pe){S.pe=false;updatePromptUI();}
    if(S.ake){getCurrentProviderConfig().apiKey=E.ak.value.trim();S.ake=false;updateProviderUI();}
    if(S.tke){S.maxTokens=parseInt(E.ts.value);S.tke=false;updateTokUI();}
    const m=E.ui.value.trim();if(!m){E.rs.textContent='⚠️ 请输入内容';setTimeout(()=>{E.rs.textContent='';},2000);return;}
    addM('user',m);E.ui.value='';E.ui.style.height='auto';E.ui.focus();
    S.ir=true;E.snd.style.display='none';E.stp.style.display='flex';E.rs.textContent='⏳ ...';
    streamSend(m);
  }

  E.ui.addEventListener('keydown',e=>{if(e.isComposing||e.keyCode===229)return;if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
  E.ui.addEventListener('input',()=>{E.ui.style.height='auto';E.ui.style.height=Math.min(E.ui.scrollHeight,150)+'px';});
  E.sl.addEventListener('click',toggleL);E.sr.addEventListener('click',toggleR);
  E.mp.addEventListener('click',()=>{if(S.pe){E.ps.textContent='已在编辑';setTimeout(()=>{E.ps.textContent='';},1500);return;}S.pe=true;updatePromptUI();E.ps.textContent='编辑中';});
  E.cp.addEventListener('click',()=>{if(!S.pe)return;const p=E.pt.value.trim();if(!p){E.ps.textContent='不能为空';setTimeout(()=>{E.ps.textContent='';},2000);return;}S.ap=p;const c=gC();if(c)c.prompt=p;S.pe=false;updatePromptUI();save();E.ps.textContent='✅';setTimeout(()=>{E.ps.textContent='';},2500);});
  E.al.addEventListener('click',toggleApiLock);E.ib.addEventListener('click',importConv);
  E.snd.addEventListener('click',send);E.stp.addEventListener('click',()=>{stopR();E.rs.textContent='⏹️ 停止中...';});
  E.tt.addEventListener('click',toggleTheme);
  E.temp.addEventListener('change',function(){S.temp=parseFloat(this.value);save();});
  E.clrI.addEventListener('click',()=>{E.ui.value='';E.ui.style.height='auto';E.ui.focus();});
  E.clrC.addEventListener('click',()=>{if(confirm('清空对话？')){const c=gC();if(c){c.messages=[];c.history=[];S.ch=[];}clearM();addE();save();updateJL();}});
  E.nc.addEventListener('click',createC);
  E.tsb.addEventListener('click',toggleSearch);E.sx.addEventListener('click',()=>{E.sb.style.display='none';clearSearch();});
  E.si.addEventListener('input',doSearch);E.si.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();navS(e.shiftKey?-1:1);}if(e.key==='Escape'){E.sb.style.display='none';clearSearch();}});
  E.sp.addEventListener('click',()=>navS(-1));E.sn.addEventListener('click',()=>navS(1));
  document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='f'){e.preventDefault();toggleSearch();}});

  function checkScroll(){const cc=E.cc;if(!cc)return;const d=cc.scrollHeight-cc.clientHeight-cc.scrollTop;const near=d<80;S.isNearBottom=near;if(E.sbb)E.sbb.classList.toggle('show',!near&&cc.scrollHeight>cc.clientHeight+20);}
  function scrollToBottom(){if(E.cc){E.cc.scrollTop=E.cc.scrollHeight;S.isNearBottom=true;if(E.sbb)E.sbb.classList.remove('show');}}
  if(E.sbb)E.sbb.addEventListener('click',scrollToBottom);
  if(E.cc)E.cc.addEventListener('scroll',checkScroll);
  window.addEventListener('beforeunload', (e) => {
  const c = gC();
  if (c && c.messages && c.messages.length > 0) {
    e.preventDefault();
    e.returnValue = '您有未保存的对话内容，确定离开吗？';
    return e.returnValue;
  }
});
  load();init();updatePromptUI();updateTokUI();setTimeout(checkScroll,500);
})();
</script>
</body>
</html>
